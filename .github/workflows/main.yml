---
name: CI
on:
  push:
    branches: [main]
    tags: [v*.*.*]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  taskotter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Sync TaskOtter taskfiles
        id: taskotter
        uses: ./.github/actions/taskotter
        with:
          tasks: |
            go
            staticcheck
            actionlint
            yamllint
            zizmor
            adrs
          token: ${{ github.token }}
