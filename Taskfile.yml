---
version: "3"
includes:
  go:
    taskfile: taskfiles/go/Taskfile.yml
    vars:
      INSTALL_DIR_UNIX: "/usr/local"
      GO_ROOT_UNIX: "{{.INSTALL_DIR_UNIX}}/go"
      GO_BIN_UNIX: "{{.GO_ROOT_UNIX}}/bin"
      GO_CMD_UNIX: "{{.GO_BIN_UNIX}}/go"
      GO_VERSION_URL: https://go.dev/VERSION?m=text
      GO_DOWNLOAD_BASE_URL: https://go.dev/dl
      GO_VERSION: ""
      GOLANGCI_LINT_VERSION: ""
      GOFUMPT_VERSION: ""
      GOIMPORTS_VERSION: ""
      GOVULNCHECK_VERSION: ""
      GOSEC_VERSION: ""
      GLOBAL_GO_BIN:
        sh: |
          gobin="${GOBIN:-}"
          if [ -z "$gobin" ] && command -v go >/dev/null 2>&1; then
            gobin="$(go env GOBIN)"
          fi
          if [ -z "$gobin" ]; then
            gopath="${GOPATH:-}"
            if [ -z "$gopath" ] && command -v go >/dev/null 2>&1; then
              gopath="$(go env GOPATH)"
            fi
            gobin="${gopath:-$HOME/go}/bin"
          fi
          printf '%s' "$gobin"
  staticcheck:
    taskfile: taskfiles/staticcheck/Taskfile.yml
    vars:
      STATICCHECK_VERSION: "2026.1"
      STATICCHECK_RELEASE_BASE_URL: https://github.com/dominikh/go-tools/releases/download
      GLOBAL_GO_BIN:
        sh: |
          gobin="$(go env GOBIN)"
          if [ -z "$gobin" ]; then
            gobin="$(go env GOPATH)/bin"
          fi
          printf '%s' "$gobin"
  actionlint:
    taskfile: taskfiles/actionlint/Taskfile.yml
    vars:
      ACTIONLINT_VERSION: "1.7.12"
      EXTRA_ARGS: ""
      TARGETS: ""
  yamllint:
    taskfile: taskfiles/yamllint/Taskfile.yml
    vars:
      UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
      TARGETS: "."
      CONFIG: ""
      EXTRA_ARGS: ""
      YAMLLINT_VERSION: ""
      YAMLFIX_VERSION: ""
  zizmor:
    taskfile: taskfiles/zizmor/Taskfile.yml
    vars:
      # NOTE: Keep EXTRA_ARGS empty here. Task v3 merges included Taskfiles'
      # file-level vars into one shared scope, so a non-empty default would leak
      # into sibling includes (buf, hadolint, ...) and get passed as a bogus flag.
      # The offline default lives in the namespaced ZIZMOR_EXTRA_ARGS instead.
      EXTRA_ARGS: ""
      ZIZMOR_EXTRA_ARGS: "--offline"
      TARGETS: ".github"
      ZIZMOR_VERSION: "1.25.2"
  adrs:
    taskfile: taskfiles/adrs/Taskfile.yml
    vars:
      CARGO_BIN_UNIX: "$HOME/.cargo/bin"
      EXTRA_ARGS: ""
      ADRS_VERSION: ""
tasks:
  lint:
    run: once
    desc: Run all lint tasks from included Taskfiles
    deps:
      - go:lint
      - staticcheck:lint
      - actionlint:lint
      - yamllint:lint
      - zizmor:lint
  lint:fix:
    run: once
    desc: Run all auto-fix lint tasks from included Taskfiles
    cmds:
      - task: go:lint:fix
      - task: yamllint:lint:fix
  fmt:
    run: once
    desc: Run all format tasks from included Taskfiles
    cmds:
      - task: go:fmt
  fmt:check:
    run: once
    desc: Run all format check tasks from included Taskfiles
    deps:
      - go:fmt:check
  fmt:chek:
    run: once
    desc: Alias for fmt:check
    cmds:
      - task: fmt:check
  test:
    run: once
    desc: Run Go tests
    cmds:
      - go test ./...
  test:coverage:
    run: once
    desc: Run Go tests and report coverage per function
    cmds:
      - go test -covermode=atomic -coverprofile=coverage.out ./...
  check:
    run: once
    desc: Enforce the modularity policy thresholds; exits 3 on violations
    cmds:
      - >-
        go run . --check
        --max=types=10
        --max=exported_funcs=20
        --max=unexported_funcs=35
        --max=efferent=11
        --max=afferent=12
        --max=package.distance=0.70
        --max=fields=14
        --max=methods=5
        --max=type.amc=4
        --max=type.lcom1=5
        --max=type.lcom96b=0.70
        --min=type.camc=0.30
        --min=type.tcc=0.70
        --max=type.cbo=4
        --min=type.reusability=0.5
        ./...
  ci:
    run: once
    desc: Run CI checks
    cmds:
      - task: fmt:check
      - task: lint
      - task: test:coverage
  ci:fix:
    run: once
    desc: Run CI fix
    cmds:
      - task: fmt
      - task: lint:fix
